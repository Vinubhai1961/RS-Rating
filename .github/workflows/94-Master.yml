name: Master RS Pipeline (From Job 4 Onwards)

on:
  #workflow_run:
    #workflows: ["Split rs_stocks.csv"]   # ← Triggered automatically after 3-split_rs_stocks.yml finishes
    #types: [completed]
    #branches: [main]

  workflow_dispatch:   # Manual trigger for testing

permissions:
  contents: write      # Needed for git push in child workflows

jobs:

  # 8. Filter strong RS stocks near 52-week high
  filter-52wh:
    uses: ./.github/workflows/8-rs-52wh-filter.yml

  # 91. Generate-IPO
  generate-ipo:
    needs: filter-52wh
    uses: ./.github/workflows/91-Generate-IPO.yml
    
  # 95. update_earnings_calendar
  update_earnings_calendar:
    needs: generate-ipo
    uses: ./.github/workflows/95-update_earnings_calendar.yml

  # 96. build-ipo-history
  build-ipo-history:
    needs: update_earnings_calendar
    uses: ./.github/workflows/96-build-ipo-history.yml
