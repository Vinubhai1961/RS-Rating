name: Generate-IPO

on:
  workflow_run:
    workflows: ["Update RS Rating Thresholds for TradingView"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # allow manual run
  push:
    branches:
      - main
    paths:
      - 'logs/debug_rs/debug-rs-*.csv'           # updated trigger pattern
      - 'RS_Data/rs_stocks.csv'

jobs:
  generate-ipo-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pandas
        run: pip install pandas

      - name: Generate IPO_stocks.csv
        run: |
          python - <<'PY'
          import pandas as pd
          import os
          import glob

          DEBUG_DIR  = "logs/debug_rs"
          RS_FILE    = "RS_Data/rs_stocks.csv"
          OUTPUT_FILE = "RS_Data/IPO_stocks.csv"

          # 1. Find and load all debug-rs-*.csv files
          debug_files = glob.glob(os.path.join(DEBUG_DIR, "debug-rs-*.csv"))

          if not debug_files:
              print("No debug-rs-*.csv files found in logs/debug_rs/")
              pd.DataFrame(columns=pd.read_csv(RS_FILE).columns).to_csv(OUTPUT_FILE, index=False)
              print(f"Created empty {OUTPUT_FILE}")
          else:
              print(f"Found {len(debug_files)} debug files:")
              for f in debug_files:
                  print(f"  - {os.path.basename(f)}")

              # Combine all matching debug files
              debug_dfs = []
              for file in debug_files:
                  df = pd.read_csv(file)
                  debug_dfs.append(df)

              debug_df = pd.concat(debug_dfs, ignore_index=True)

              # Optional: remove exact duplicates if any overlap exists
              debug_df = debug_df.drop_duplicates(subset=['Ticker'], keep='first')

              # 2. Filter for recent IPOs (Days < 100)
              debug_df = debug_df[debug_df['Days'] < 100]

              if debug_df.empty:
                  print("No IPO stocks found (Days < 100). Creating empty IPO_stocks.csv")
                  pd.DataFrame(columns=pd.read_csv(RS_FILE).columns).to_csv(OUTPUT_FILE, index=False)
              else:
                  ipo_tickers = set(debug_df['Ticker'].str.strip())

                  # 3. Load full rs_stocks
                  rs_df = pd.read_csv(RS_FILE)

                  # 4. Filter rows where Ticker is in IPO list
                  ipo_df = rs_df[rs_df['Ticker'].isin(ipo_tickers)].copy()

                  # Ensure same column order as original rs_stocks.csv
                  ipo_df = ipo_df[rs_df.columns]

                  # Sort by Rank if exists (optional, for readability)
                  if 'Rank' in ipo_df.columns:
                      ipo_df = ipo_df.sort_values(by='Rank', na_position='last').reset_index(drop=True)

                  # Save
                  ipo_df.to_csv(OUTPUT_FILE, index=False)
                  print(f"Found {len(ipo_df)} IPO stocks. Saved to {OUTPUT_FILE}")

          # Show first few rows for log
          if os.path.exists(OUTPUT_FILE):
              print("\nFirst 10 rows of IPO_stocks.csv:")
              print(pd.read_csv(OUTPUT_FILE).head(10).to_string(index=False))
          PY

      - name: Commit and push if IPO_stocks.csv changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RS_Data/IPO_stocks.csv
          if git diff --staged --quiet; then
            echo "No changes to IPO_stocks.csv"
          else
            git commit -m "chore: update IPO_stocks.csv from latest debug-rs files [skip ci]"
            git push
            echo "IPO_stocks.csv updated and pushed"
          fi
