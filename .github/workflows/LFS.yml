name: 📤 Migrate History_HVE.csv to Git LFS

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  setup-lfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS
        run: git lfs install

      - name: Clean working directory
        run: |
          git reset --hard HEAD
          git clean -fd

      - name: Track specific file with Git LFS
        run: |
          git lfs track "HVE/History_HVE.csv"
          git add .gitattributes

      - name: Add the large CSV to LFS
        run: |
          git add HVE/History_HVE.csv

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Track History_HVE.csv with Git LFS"
            git push
          fi
