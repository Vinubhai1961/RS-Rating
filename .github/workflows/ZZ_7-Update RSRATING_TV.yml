name: Update RSRATING_TV

on:
  workflow_call:  
  workflow_dispatch: # Manual trigger
  #branch_protection_rule: workflow_run:
    #workflows: ["Filter Top RS Sector Opportunities"]
    #types: [completed]
    #branches: [main]

jobs:
  update-rsrating:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Update RSRATING_TV.csv
        run: |
          python << 'EOF'
          import pandas as pd
          import datetime as dt

          input_file = "RS_Data/RSRATING.csv"
          output_file = "RS_Data/RSRATING_TV.csv"

          # Generate last 35 calendar days ending today, oldest first
          today = dt.date.today()
          dates = [(today - dt.timedelta(days=i)).strftime("%Y%m%dT") for i in range(34, -1, -1)]

          # Read CSV and replace the first column with new dates
          df = pd.read_csv(input_file, header=None)
          if len(df) >= 35:
              df.iloc[:35, 0] = dates
          else:
              df.iloc[:, 0] = dates[:len(df)]

          # Save updated CSV
          df.to_csv(input_file, index=False, header=False)

          # Process RSRATING_TV output
          df = pd.read_csv(input_file, header=None)
          df.to_csv(output_file, index=False, header=False)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add RS_Data/RSRATING.csv RS_Data/RSRATING_TV.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update RSRATING files with last 35 calendar days"

            echo "Pulling latest changes before push..."
            git pull --rebase origin main || echo "Pull had issues, continuing..."

            echo "Pushing changes..."
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ Successfully pushed changes"
                break
              else
                echo "Push failed (attempt $i/3). Retrying..."
                sleep 3
                git pull --rebase origin main || true
              fi
            done
          fi
