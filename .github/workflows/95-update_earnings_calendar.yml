name: Update Earnings Calendar

on:
  schedule:
    - cron: "15 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for proper git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Build earnings calendar
        run: |
          python scripts/build_earnings_calendar.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Earnings/*.csv
          
          if git diff --staged --quiet; then
            echo "No changes to commit. Earnings calendar is up to date."
          else
            COMMIT_MSG="Update Earnings Calendar [$(date +'%Y-%m-%d %H:%M:%S')]"
            echo "Committing with message: $COMMIT_MSG"
            
            git commit -m "$COMMIT_MSG [skip ci]"
            
            echo "🔄 Pulling latest changes from main..."
            git pull --rebase origin main || echo "Pull had minor issues (maybe no upstream changes)"
            
            echo "🚀 Pushing changes..."
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ Push successful"
                break
              else
                echo "⚠️ Push failed (attempt $i). Retrying..."
                sleep 3
                git pull --rebase origin main || true
              fi
            done
          fi
