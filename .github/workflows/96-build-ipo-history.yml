# .github/workflows/build-ipo-history.yml

name: Build IPO History

on:
  workflow_call:
  workflow_dispatch:

  #schedule:
    # Runs every day at 6:30 AM UTC
    #- cron: "30 6 * * *"

permissions:
  contents: write

jobs:
  build-ipo-history:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests

      - name: Build IPO history
        run: |
          python scripts/build_ipo_history.py

      - name: Commit and push IPO history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add IPO/IPO_*.csv || true

          if git diff --staged --quiet; then
            echo "No IPO history changes to commit"
          else
            git commit -m "chore: update IPO history"

            echo "Pulling latest changes..."
            git pull --rebase origin main || echo "Pull had minor issue, continuing..."

            echo "Pushing IPO history..."
            for i in {1..3}; do
              if git push origin main; then
                echo "Push successful"
                break
              else
                echo "Push failed attempt $i/3"
                sleep 5
              fi
            done
          fi
