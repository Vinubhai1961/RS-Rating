name: Filter Top RS Sector Opportunities

on:
  workflow_call:  
  workflow_dispatch: # Manual trigger
  #workflow_run:
    #workflows: ["Filter Top RS Opportunities"]
    #types: [completed]
    #branches: [main]


jobs:
  filter_top_Sector:
    runs-on: ubuntu-latest
    # Only run if the Filter Top RS Opportunities workflow completed successfully or for workflow_dispatch
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      # Print workflow start time
      - name: Print workflow start time (EDT)
        run: |
          echo "Workflow started at $(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')"

      # Check out the repository
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # Set up Python environment
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install dependencies
      - name: 📦 Install Dependencies
        run: pip install pandas

      # Run the RS sector opportunity filter script
      - name: 🧮 Run RS Opportunity Filter
        run: python scripts/filter_top_sectors.py

      # Commit and push the results
      - name: 📤 Commit & Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the file(s) - using the same pattern you had
          if ls IBD-20/rs_top_sectors_opportunities_*.csv 1> /dev/null 2>&1; then
            git add IBD-20/rs_top_sectors_opportunities_*.csv

            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "📊 Add RS Sector + Opportunity Report [$(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')]"

              # Critical part: Pull latest changes before pushing
              echo "Pulling latest changes with rebase..."
              git pull --rebase origin main || echo "Pull had no effect or minor issue"

              # Push with retry logic (handles race conditions better)
              echo "Pushing changes..."
              for i in {1..3}; do
                if git push origin main; then
                  echo "✅ Push successful"
                  break
                else
                  echo "Push failed (attempt $i/3). Retrying after pull..."
                  sleep 3
                  git pull --rebase origin main || true
                fi
              done
            fi
          else
            echo "⚠️ No RS combined report file found. Skipping commit."
          fi

      # Print workflow end time
      - name: Print workflow end time (EDT)
        run: |
          echo "Workflow ended at $(date -u -d '4 hours ago' +'%I:%M %p EDT on %A, %B %d, %Y')"
